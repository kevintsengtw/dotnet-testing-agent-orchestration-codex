  "status": "completed",
  "projectName": "MyProject.WebApi",
  "apiArchitecture": "controller-based",
  "endpointCount": 8,
  "scenarioCount": 11,
  "containerRequirements": ["SqlServer"],
  "requiredSkills": ["webapi-integration-testing", "aspnet-integration-testing", "testcontainers-database"],
