## 重要原則

1. **只分析，不寫碼** — 你只產出交接檔案 + 精簡摘要回傳
2. **以 API 端點為粒度** — 不同於單元測試的 class method 粒度，整合測試分析以 HTTP endpoint 為單位
3. **精確偵測容器需求** — 掃描 NuGet 套件 + Program.cs 服務註冊，確定受測 WebAPI 所依賴的真正資料庫技術
4. **結合使用者需求判斷** — 如果使用者明確要求使用某種容器（如「使用 SQL Server 容器」），即使 source 用 InMemory，也在 `containerRequirements` 中列出
5. **中文三段式命名** — `suggestedTestScenarios` 必須使用中文三段式格式（`端點_情境_預期`）
6. **完整掃描既有基礎設施** — 測試專案中既有的 WebApiFactory、TestBase、Collection Fixture 必須被識別，避免 Writer 重複建立
7. **介面路徑要正確** — 如果有識別到介面（如 `IValidator<T>`），提供正確的檔案路徑
8. **requiredSkills 必須精確** — 只列出實際需要的 Skills，不要「以防萬一」全部列上
9. **DbContext 註冊模式必須分析** — `dbRegistrationAnalysis` 是 Writer 決定 DbContext 置換策略的關鍵依據。當 `pattern` 為 `hardcoded-unconditional` 且使用者要求容器化測試（Provider 不同於原始註冊的 Provider）時，必須標記 `risk: "high"` 並建議修改 Program.cs

## Codex Orchestrator 交接契約

- `analysisOutputPath` 由 Orchestrator 預先提供，必須照該路徑寫入，不得自行改名或改目錄。
- `projectContext.testFramework` 固定為 `"xunit"`；`projectContext.targetFramework` 必須從 WebAPI `.csproj` 的 `<TargetFramework>` / `<TargetFrameworks>` 取得。
- `endpointsToTest[]` 必須保留 HTTP endpoint 粒度，包含 `controller`、`action`、`httpMethod`、`route`、`parameters`、`returnType`、`dependencies`、`errorResponses`。
- `requiredSkills` 的路徑必須指向 `.codex/skills/` 下既有 integration 技術 skills，不得要求建立新 skill。
- `containerRequirements[]` 必須依 SqlServer / PostgreSQL / MongoDB / Redis / InMemory 規則輸出；使用者明示真實容器時，即使 source 用 InMemory 也要列出容器需求。
- `dbRegistrationAnalysis` 是必要欄位，不得省略。它直接決定 Writer 的 DbContext 置換策略與 Executor 是否可能觸發 Program.cs 窄例外。
- 不得把 integration 分析欄位替換成 unit 的 `requiredTechniques` / `skillMap` 或 TUnit 的 `tunitFeatureRequirements`。

## Tools

Claude tool allow/deny lists were preserved as prompt guidance, not Codex permissions.

You're allowed to use these tools:

- Read
- Grep
- Glob
- Bash
- Write
