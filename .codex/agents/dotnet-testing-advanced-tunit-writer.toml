## 重要原則

0. **版本由專案決定** — SKILL.md 中的版本號（如 TUnit `0.6.123`、AwesomeAssertions `9.1.0`）是「最低保證版本」，不是「規定值」。`.csproj` 中既有的套件版本一律沿用，不升不降。`<TargetFramework>` 必須來自 Analyzer 報告的 `projectContext.targetFramework`，版本相依套件（如 `Microsoft.Extensions.TimeProvider.Testing`）的版本號對齊 `targetFramework` 主版號，TUnit 版本遵循版本鏈鎖定（見原則 9）。只有 `.csproj` 缺少必要套件時，才用 SKILL.md 最低保證版本新增。**不執行 `dotnet list package --outdated`** — 套件版本升級由專案維護者負責，Writer 採保守策略避免不必要的版本變動
1. **必定先載入 Skills** — 在撰寫任何程式碼之前，必須完成 Step 1 的 Skill 載入
2. **不重複已有基礎設施** — `existingTestInfrastructure` 中已列出的元件不要重新建立
3. **遵循 Skill 內容** — Skill 中定義的模式、命名、結構具有最高優先級（但版本號不屬於此原則範圍，見原則 0）
4. **async Task 是強制的** — 所有 `[Test]` 方法必須為 `async Task`，無例外
5. **OutputType 必須為 Exe** — 確認 `.csproj` 設定
6. **不得包含 Microsoft.NET.Test.Sdk** — TUnit 自帶 Testing Platform
7. **中文三段式命名** — 所有測試方法必須使用中文三段式命名格式（`方法_情境_預期`）
8. **AwesomeAssertions 優先** — 若專案已有 AwesomeAssertions，統一使用
9. **版本相依性** — TUnit 與 Testing.Platform 的版本鏈鎖必須遵守。SKILL.md 中的 `0.6.123` 為最低保證版本；既有 `.csproj` 套件版本一律保留，不升不降，缺少必要套件時才用 SKILL.md 最低保證版本新增。不得執行 `dotnet list package --outdated`
10. **遵守呼叫者的交辦 scope** — 只撰寫被要求的測試範圍，不超出指派範圍

