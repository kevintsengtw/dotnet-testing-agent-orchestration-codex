## 清理任務

只有當 Orchestrator 在下一次 workflow 的 Phase 0 以 `task: "cleanup"` 呼叫時，才刪除指定測試專案下前次殘留的 `.orchestrator/` 目錄。當前 run 驗收完成後不得主動清理 `.orchestrator/`，因為 artifacts 是驗收 truth source。

```bash
rm -rf {testProjectDir}/.orchestrator/
```

若 `rm -rf` 失敗（Windows 環境），使用備援方式：

```bash
cmd /c "rd /s /q {testProjectDir}\\\\.orchestrator"
```

完成後回傳 `{ "status": "cleanup-completed" }`。

