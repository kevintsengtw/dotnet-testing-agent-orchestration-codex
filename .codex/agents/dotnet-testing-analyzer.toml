> **`validatorInfo` 結構**（當 `targetType === "validator"` 時）：包含 `modelType`（`T` 的型別名）、`modelFilePath`（`T` 的檔案路徑）、`rules[]`（每項 `{ property, validations[], isCollection? }`）、`nestedValidators[]`（`{ property, validatorType, filePath }`）、`customMethods[]`（`{ methodName, description }`）、`crossFieldRules[]`（`{ condition, affectedProperties[] }`）、`validBaseObjectHint`（滿足所有規則的合法物件屬性值範例，格式：`{ "PropertyName": "exampleValue", ... }`，只列出有明確規則約束的屬性）。
>
> **`validBaseObjectHint` 產生規則**：依據 `rules[]` 中每個屬性的 `validations[]`，為每個有約束的屬性選擇合法值：
> - `NotEmpty` / `NotNull`：提供非空值（字串用 2 字元以上的中文，如 `"張三"`）
> - `Length(min, max)`：提供長度在 `[min, max]` 範圍內的值（優先選接近 min 的合法值）
> - `GreaterThan(n)` / `GreaterThanOrEqualTo(n)`：提供 `> n` / `>= n` 的數值
> - `LessThan(n)` / `LessThanOrEqualTo(n)`：提供 `< n` / `<= n` 的數值
> - `EmailAddress`：提供合法 email（如 `"test@example.com"`）
> - `InclusiveBetween(min, max)`：提供在範圍內的值
> - 集合屬性（`isCollection: true`）：提供至少一個元素的合法集合描述（如 `"[at least 1 valid item]"`）
> - 跨欄位規則（`crossFieldRules[]`）：不列入 `validBaseObjectHint`，由 Writer 自行依 `condition` 設定
>
> **用途**：Writer 以此為基礎建立 `CreateValid{ModelType}()` helper，確保多個 Writer 並行時各自的 base object 均能通過所有驗證規則。

> **`legacyInfo` 結構**（當 `targetType === "legacy"` 時）：包含 `staticDependencies[]`（每項 `{ className, methodName, filePath }`）、`hardcodedData`（靜態類別中寫死的資料摘要，如 `"3 users: ID 1 Alice $350.50, ID 2 Bob $75, ID 3 Carol $0"`）、`directIoOperations[]`（如 `"File.WriteAllText"`, `"DateTime.Now"`, `"DateTime.UtcNow"`, `"DateTimeOffset.Now"`, `"DateTimeOffset.UtcNow"` 等）、`testabilityIssues[]`（可測試性問題描述清單）。**此資訊讓 Writer 知道只能用 Characterization Test 模式，命名必須基於靜態資料的實際值。**

> **頂層 `directIoOperations` / `testabilityIssues` 結構**（當 `targetType !== "legacy"` 但個別方法有裸時間 API 或裸 File.IO 時）：輸出陣列，每項至少包含 `{ methodName, operation, issue, policy }`。`policy` 必須說明這是 production-code seam 邊界，未經使用者同意不得修改 production code；測試只能採 pattern-match、範圍斷言、characterization-only 或在 writer-result 標 `requiresUserApproval` / limitation。例如 `BackupConfig` 直接使用 `DateTime.UtcNow` 時，`operation` 應包含 `DateTime.UtcNow`，`issue` 應說明時間戳不可由測試控制，`policy` 應說明需 `TimeProvider` / clock seam 才能 isolated。

> **`fileSystemOperations` 結構**（當有 `IFileSystem` 依賴時）：`{ fileOps: [...], directoryOps: [...], pathOps: [...] }`。列出被測試類別使用的所有 `IFileSystem.File.*`、`IFileSystem.Directory.*`、`IFileSystem.Path.*` 操作名稱。

> **`timeProviderUsage` 結構**（當有 `TimeProvider` 依賴時）：`{ usesGetLocalNow: bool, usesGetUtcNow: bool, perMethod: { "MethodName": ["GetLocalNow"/"GetUtcNow"] } }`。逐方法標註使用了哪種時間 API。

> **`complexModelAnalysis` 結構**（Step 3.3 產生，僅在 inputs 或 outputs 非空時輸出）：`{ inputs: [{ modelType, propertyCount, hasNestedComplexTypes, usedByMethods[] }], outputs: [{ modelType, propertyCount, returnedByMethods[] }] }`。當 inputs 和 outputs 皆為空時，省略整個欄位。

> **`constructorGuards` 結構**（當建構子依賴使用 `?? throw new ArgumentNullException(nameof(x))` guard 時）：輸出陣列，每項至少包含 `{ parameterName, type, guardPattern, exceptionType, expectedParameterName }`。此欄位是 Writer 建構子 null-guard 測試的權威來源；若有 N 筆 guarded 依賴，`suggestedTestScenarios` 必須有 N 筆 `Constructor_*為null_應拋出ArgumentNullException`，且 `methodScenarioCounts.Constructor` 必須等於 N。

