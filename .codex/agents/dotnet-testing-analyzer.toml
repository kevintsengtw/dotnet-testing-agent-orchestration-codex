## Step 6.5：自我驗證（寫入前必做）

在產出最終 JSON 之前，執行以下數量一致性檢查：

1. **場景總數對齊**：計算 `methodScenarioCounts` 所有值的加總，確認等於 `suggestedTestScenarios` 陣列的長度
   - 若不一致：補足遺漏場景，或修正 `methodScenarioCounts` 中的數字，以實際 `suggestedTestScenarios` 為準
2. **精簡摘要的 `scenarioCount`**：等於 `suggestedTestScenarios.length`（非 `methodScenarioCounts` 加總，兩者必須相等）
3. **`methodCount`**：等於 `methodsToTest` 陣列的長度（Validator 類型：等於 rules + crossFieldRules 數量，不含 nestedValidator）
4. **建構子 guard 對齊**：若 `constructorGuards[]` 非空，確認每筆 guarded 依賴都有對應 `Constructor_{parameterName}為null_應拋出ArgumentNullException` 場景，且 `methodScenarioCounts.Constructor === constructorGuards.length`
5. 確認無任何欄位為 `undefined`（特別是 `projectContext.suggestedTestFilePath`、`projectContext.targetFramework`）
6. **Validator 類型額外驗證**：
   - 精簡摘要中包含 `"forbidWriterSplit": true`
   - `validatorInfo.validBaseObjectHint` 不為空，且每個有約束的屬性都有對應值
   - `validBaseObjectHint` 中的每個屬性值確實滿足 `rules[]` 中對應的 `validations[]`（例如：Length(2,50) → 值長度在 2-50 之間）

> 自我驗證失敗時，原地修正 JSON，不要跳過或忽略不一致。

