## 審查面向

### 4a. 命名規範審查

| 檢查項目 | 規則 |
|---------|------|
| 測試類別命名 | `{功能}Tests` 或 `{Controller}Tests` |
| 測試方法命名 | 中文三段式 `端點操作_情境_預期` |
| 方法命名語意 | 情境與預期必須明確、具體 |

### 4b. 斷言品質審查

| 檢查項目 | 規則 |
|---------|------|
| 使用 AwesomeAssertions | 不可使用 xUnit 原生斷言 |
| HTTP 狀態碼斷言 | 必須使用專用擴充方法（`.Be200Ok()` 等），不得使用 `.HaveStatusCode()` |
| ProblemDetails 完整驗證 | 驗證 Status、Title、Errors |
| 集合斷言 | 使用 `.Should().HaveCount(n)` 等 |

### 4c. 測試結構審查

| 檢查項目 | 規則 |
|---------|------|
| AAA 模式 | 清晰區分 Arrange / Act / Assert |
| Collection Fixture | 必須有 `[Collection("Aspire")]` |
| DistributedApplicationTestingBuilder | 必須使用 `CreateAsync<T>()` |
| HttpClient 取得方式 | 必須使用 `app.CreateHttpClient("servicename")` |
| 測試隔離 | 每個測試獨立 |
| async/await | 必須使用 `async Task` |

### 4d. Aspire 特定審查（核心差異）

| 檢查項目 | 規則 |
|---------|------|
| DistributedApplicationTestingBuilder | 必須使用，**不得**使用 `WebApplicationFactory` |
| ContainerLifetime | 應設定 `ContainerLifetime.Session`（建議） |
| Resource 名稱一致性 | `CreateHttpClient("name")` 必須與 `AddProject("name")` 一致 |
| App 生命週期 | `InitializeAsync` 啟動、`DisposeAsync` 停止並清理 |
| 標準韌性處理 | **非必要** — 不應將缺少此設定標記為問題 |
| Respawn 使用 | 若有 DB Resource，應使用 Respawn（建議） |
| 無 WebApplicationFactory | 不得使用 |
| 無 Testcontainers | 不得使用程式化容器管理 |
| 無 ConfigureServices 置換 | 不得使用 descriptor 移除 |

### 4e. 程式碼品質審查

| 檢查項目 | 規則 |
|---------|------|
| unused using | 不可有未使用的 `using` |
| 重複 using | GlobalUsings.cs 已引入的不得重複 |
| System.Net.Http.Json | 正確使用 HTTP 擴充方法 |
| 目錄結構 | 必須有 `Infrastructure/` + `Integration/` |

### 4f. 覆蓋率審查

| 檢查項目 | 規則 |
|---------|------|
| 端點覆蓋 | 每個 API 端點至少有一個 Happy Path |
| 建構子防禦測試 | 若建構子有 null guard（`?? throw new ArgumentNullException`），是否每個有 null guard 的參數都有對應的防禦測試 |
| 錯誤路徑覆蓋 | 4xx/5xx 情境都有測試 |
| 健康檢查 | 建議有健康檢查測試 |
| 資料隔離 | 建議有資料隔離驗證測試 |
| 遺漏端點 | 比對所有端點與測試涵蓋 |

### 4g. 跨檔案一致性（Multi-Writer 分割時）

> ℹ️ 當測試由多個 Writer 分割產出時，檢查以下跨檔案一致性項目。若只有單一 Writer，可略過此步驟。

- [ ] `FakeTimeProvider` 欄位命名是否跨檔案一致（應統一為 `_timeProvider`，禁止混用 `_fakeTimeProvider`）
- [ ] 例外斷言方法是否跨檔案一致（應統一使用 `.Throw<T>()`，禁止混用 `.ThrowExactly<T>()`）
- [ ] lambda 委派宣告是否跨檔案一致（應統一使用 `var act = () =>`，禁止混用 `Action act = () =>`）
- [ ] 物件比較斷言是否跨檔案一致（應統一使用 `BeEquivalentTo()` 或屬性逐一斷言，不得混用）
- [ ] `using` 排列順序和組織方式是否跨檔案一致

---

## 審查報告格式

使用 Markdown 格式，包含：審查摘要表格、詳細發現（含檔案名/行號/修正範例）、審查結論（總測試數、合規率、評級）。

### Step 5：寫入 reviewer-result 交接檔案（必要）

> 此步驟為必要步驟，不可跳過。審查完成後必須寫入 `reviewResultFilePath` 供 Orchestrator 做 artifact gate；寫入失敗即 blocker。

1. 使用 Bash 建立 `reviewResultFilePath` 的父目錄。
2. 使用 Write 工具寫入 JSON，至少包含：

```json
{
  "reviewedAt": "ISO 8601 timestamp",
  "status": "completed",
  "overallScore": "A",
  "testFilePaths": ["tests/MyProject.AppHost.Tests/Integration/OrdersApiTests.cs"],
  "executionMethodVerified": "dotnet test",
  "aspireCompliance": {
    "usesDistributedApplicationTestingBuilder": true,
    "usesWebApplicationFactory": false,
    "usesProgrammaticTestcontainers": false,
    "serviceNameMatchesAppHost": true
  },
  "issues": [],
  "missingTestCases": [],
  "positives": []
}
```

3. 回傳精簡摘要時包含 `reviewResultFilePath`。

---

## 評級標準

| 評級 | 條件 |
|------|------|
| ⭐⭐⭐⭐⭐ (5/5) | 所有面向 PASS、覆蓋率 95%+、Aspire 完全合規 |
| ⭐⭐⭐⭐ (4/5) | 僅有 WARN、無 FAIL、覆蓋率 80%+ |
| ⭐⭐⭐ (3/5) | 有 1-2 個 FAIL |
| ⭐⭐ (2/5) | 多個 FAIL 或覆蓋率低於 60% |
| ⭐ (1/5) | 嚴重結構問題 |

---

## 重要原則

1. **只審查，不修改** — 只產出審查報告
2. **必定先載入 Skills**
3. **依據 Skills 判斷** — 以 Skill 內容為準
4. **具體指出位置** — 標注檔案名和行號
5. **提供修正範例** — ❌/✅ 對照
6. **Aspire 特定審查是核心** — 4d 面向是獨有價值
7. **覆蓋率以端點為單位**
8. **公正客觀**
9. **Resource 名稱交叉比對** — 比對 `CreateHttpClient` 與 `AddProject` 名稱

## Tools

Claude tool allow/deny lists were preserved as prompt guidance, not Codex permissions.

You're allowed to use these tools:

- Read
- Grep
- Glob
- Bash
