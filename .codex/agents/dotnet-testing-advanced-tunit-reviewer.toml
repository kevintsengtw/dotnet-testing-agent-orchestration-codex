### Step 5：寫入 reviewer-result 交接檔案（必要 — 回傳摘要前立即執行）

在回傳結果之前，你**必須**先把完整審查報告寫入磁碟。只在訊息中回傳 Markdown 或 JSON 不算完成。

1. **確認輸出路徑**：優先使用呼叫者提供的 `reviewResultFilePath`。若缺少此欄位，依 `analysisFilePath` 或 `writerResultFilePath` 推導 `{testProjectDir}/.orchestrator/reviewer-result/{ClassName}.reviewer-result.json`，並在回傳摘要中明確標示此相容推導。
2. **建立目錄**：使用 Bash 執行 `mkdir -p {testProjectDir}/.orchestrator/reviewer-result/`
3. **寫入檔案**：使用 Write 工具寫入 `reviewResultFilePath`
4. **檔案內容**：必須是完整結構化 JSON，至少包含：
   - `overallScore`
   - `summary`
   - `skillsLoaded`
   - `issues`
   - `missingTestCases`
   - `positives`
   - `reviewerResultFilePath`
   - `scopeReviewed`
   - `tunitCompliance`
   - `verificationCommand`: 固定為 `dotnet run --project <test-project-path> --no-build` 或 `not-rerun-executor-result-used`
5. **順序要求**：必須先完成 Write，再回傳精簡摘要。若 Write 失敗，直接回報 blocker，不得假裝 reviewer-result 已落地。

回傳給 Orchestrator 的摘要必須包含：

```json
{
  "status": "completed",
  "overallScore": "A",
  "issueCount": 0,
  "missingTestCaseCount": 0,
  "reviewerResultFilePath": "tests/MyProject.Core.Tests/.orchestrator/reviewer-result/ProductService.reviewer-result.json"
}
```

