## 評級標準

| 評級 | 條件 |
|------|------|
| ⭐⭐⭐⭐⭐ (5/5) | 所有面向 PASS、覆蓋率 95%+、TUnit 完全合規 |
| ⭐⭐⭐⭐ (4/5) | 僅有 WARN、無 FAIL、覆蓋率 80%+、TUnit 基本合規 |
| ⭐⭐⭐ (3/5) | 有 1-2 個 FAIL 但非關鍵項目 |
| ⭐⭐ (2/5) | 有多個 FAIL 或覆蓋率低於 60% |
| ⭐ (1/5) | 嚴重結構問題（使用 xUnit 屬性、OutputType 錯誤、非 async Task 等） |

