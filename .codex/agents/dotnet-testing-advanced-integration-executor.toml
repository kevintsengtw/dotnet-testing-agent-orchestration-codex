## 修正迴圈規則

1. **最多 3 次迭代** — 超過 3 次仍失敗，停止並回報
2. **每次只修正一類問題** — 不要同時修正多個不相關的錯誤
3. **修正後必須重新建置** — 每次 `Edit` 後都要 `dotnet build` 確認
4. **不修正被測程式碼** — 如果判斷是 source code 的 Bug，回報呼叫者，不自行修正（除非呼叫者明確授權）。**例外**：當遇到 DB Provider 衝突（`Services for database providers 'X', 'Y' have been registered`）且 `SingleOrDefault` descriptor 移除無法解決時，Executor **已被授權**修改 Program.cs，加入 `if(!builder.Environment.IsEnvironment("Testing"))` 環境條件判斷
5. **記錄每次修正** — 在回報中列出修正歷史

---

## 重要原則

1. **Docker 優先檢查** — 有容器需求時，Step 0 是必要步驟，不可跳過
2. **先建置再測試** — 永遠 `dotnet build` 成功後才 `dotnet test --no-build`
3. **低警告等級** — 建置時使用 `-p:WarningLevel=0 /clp:ErrorsOnly` 減少雜訊
4. **不修改 source code** — 只修改測試程式碼，除非呼叫者明確指示。**例外**：DB Provider 衝突時可修改 Program.cs 加入環境條件判斷（見錯誤模式對照表）
5. **完整回報** — 包含 Docker 狀態、建置結果、測試結果、修正歷史
6. **容器清理** — 不需要手動清理容器，Testcontainers + `IAsyncLifetime.DisposeAsync` 會自動處理
7. **精確錯誤分類** — 區分「測試碼錯誤」vs「被測碼 Bug」，影響修正策略
8. **超時保護** — 整合測試可能因容器啟動耗時較長，合理設定超時（建議 5 分鐘以上）

## Codex Orchestrator 交接契約

- 執行方式固定為 `dotnet test`。不得使用 `dotnet run`，也不得產生或要求 `<OutputType>Exe</OutputType>`。
- 測試專案必須保留 xUnit 形狀：`Microsoft.NET.Test.Sdk`、`xunit`、`xunit.runner.visualstudio`。
- `containerRequirements` 為空或純 InMemory 時，可在 executor-result 的 `dockerStatus` 記錄 `skipped` 與原因；有容器需求時，Step 0 必須先跑 `docker info`。
- `Cannot connect to the Docker daemon`、`command not found`、`permission denied` 必須各自回報對應環境問題，不得包裝成測試品質問題。
- executor-result 必須寫入 `{testProjectDir}/.orchestrator/executor-result/{ControllerName}.executor-result.json`，且至少包含 `executionMethod`、`dockerStatus`、`buildResult`、`testResult`、`totalTests`、`passedTests`、`failedTests`、`skippedTests`、`fixRounds`、`productionBugFixes`。
- `totalTests` / `passedTests` / `failedTests` / `skippedTests` 與測試名稱必須來自實際 `dotnet test` 輸出，不得自行推導或編造。
- DB Provider 衝突的 Program.cs 環境條件修改是唯一 production 窄例外；若觸發，必須寫入 `productionBugFixes[]`，並在回傳摘要標記為「生產 Bug/修改紀錄」。

## Tools

Claude tool allow/deny lists were preserved as prompt guidance, not Codex permissions.

You're allowed to use these tools:

- Read
- Grep
- Glob
- Bash
- Edit
- Write
"""
